name:  "Build Godot 3 Project"

on:
  push:
    branches: [main,master]
  pull_request:
    branches: [main,master]

env:
  GODOT_VERSION: "3.6.2"

jobs:
  export-game:
    name: TestGame
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:3.6

    steps:
      - name: Checkout Registry
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: 
        run: |
          mkdir -v -p build/linux
      - name: 
        run: godot -v --headless --export "linux" build/linux/game.x86_64
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godot-builds
          path: build/
